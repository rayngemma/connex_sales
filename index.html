<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>【CNX】 SALES BOARD</title>
<style>
  :root{
    --bg:#faf9f6; --card:#ffffff; --line:#ece9e2; --ink:#2a2a28; --muted:#8b8a84;
    --reorder:#2f8f6b; --good:#4a9e7f; --warn:#c79a3a; --bad:#c2685e; --accent:#3a6b8c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}
  h1{font-size:26px;margin:0 0 2px;letter-spacing:.5px;font-weight:800;
     display:inline-block;padding-bottom:6px;
     border-bottom:3px solid var(--accent);}
  .sub{color:var(--muted);font-size:13px;margin:10px 0 18px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tab{padding:8px 18px;border:1px solid var(--line);background:var(--card);border-radius:20px;
       cursor:pointer;font-weight:600;color:var(--muted);}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .filters{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
  .frow{margin-bottom:10px;}
  .frow:last-child{margin-bottom:0;}
  .flabel{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{padding:5px 12px;border:1px solid var(--line);background:#fff;border-radius:16px;
        cursor:pointer;font-size:13px;white-space:nowrap;}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .dates{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .dates input{padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  select{padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;max-width:220px;}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .kpi{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;}
  .kpi .l{font-size:12px;color:var(--muted);}
  .kpi .v{font-size:22px;font-weight:700;margin-top:4px;}
  .statline{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .sbadge{padding:6px 12px;border-radius:14px;font-size:13px;font-weight:600;}
  .sbadge.reorder{background:#e7f3ee;color:var(--reorder);}
  .sbadge.good{background:#eaf4ef;color:var(--good);}
  .sbadge.warn{background:#faf3e0;color:var(--warn);}
  .sbadge.bad{background:#f8eae8;color:var(--bad);}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);font-size:13px;}
  th{background:#f5f3ee;color:var(--muted);font-weight:600;text-align:right;cursor:pointer;user-select:none;}
  th:first-child,td:first-child{text-align:left;}
  th:nth-child(2),td:nth-child(2){text-align:left;}
  tr:last-child td{border-bottom:none;}
  .st{font-weight:700;}
  .st.reorder{color:var(--reorder);} .st.good{color:var(--good);}
  .st.warn{color:var(--warn);} .st.bad{color:var(--bad);}
  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .pill.reorder{background:#e7f3ee;color:var(--reorder);} .pill.good{background:#eaf4ef;color:var(--good);}
  .pill.warn{background:#faf3e0;color:var(--warn);} .pill.bad{background:#f8eae8;color:var(--bad);}
  .bar{height:180px;display:flex;align-items:flex-end;gap:6px;padding:10px 4px 0;
       background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;}
  .bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .bcol .b{width:70%;background:var(--accent);border-radius:6px 6px 0 0;transition:height .3s;}
  .bcol .t{font-size:11px;color:var(--muted);margin-top:6px;}
  .bcol .n{font-size:11px;color:var(--ink);margin-bottom:4px;}
  .hide{display:none;}
  .search{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:10px;
          font-size:14px;margin-bottom:0;}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#f0eee8;
         display:inline-block;vertical-align:middle;border:1px solid var(--line);}
  .thumb-ph{width:42px;height:42px;border-radius:8px;background:#f0eee8;border:1px solid var(--line);
            display:inline-flex;align-items:center;justify-content:center;color:#c8c5bd;font-size:10px;}
  .empty{padding:30px;text-align:center;color:var(--muted);}
  @media(max-width:600px){ h1{font-size:19px;} .kpi .v{font-size:18px;} th,td{padding:8px 8px;font-size:12px;} }

  /* 가로 스크롤 차단 + 표/카드 전환 */
  html,body{max-width:100%;overflow-x:hidden;}
  .cards{display:none;}
  .card-item{background:var(--card);border:1px solid var(--line);border-radius:14px;
             padding:14px;margin-bottom:10px;}
  .card-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .card-top .code{font-weight:700;font-size:14px;}
  .card-top .nm{font-size:12px;color:var(--muted);line-height:1.3;margin-top:2px;}
  .card-top .pill{margin-left:auto;flex-shrink:0;}
  .stock-row{display:flex;gap:10px;margin-bottom:10px;}
  .stock-box{flex:1;background:#f5f3ee;border-radius:10px;padding:10px 12px;text-align:center;}
  .stock-box .sl{font-size:11px;color:var(--muted);}
  .stock-box .sv{font-size:22px;font-weight:800;margin-top:2px;}
  .meta-row{display:flex;gap:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .meta-row b{color:var(--ink);font-weight:700;}
  td.clk{cursor:pointer;color:var(--accent);text-decoration:underline dotted;text-underline-offset:2px;}
  .detail-row td{background:#f7f5f0;padding:0;}
  .detail-wrap{padding:12px 16px;}
  .detail-wrap h4{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:700;}
  .sizetbl{width:auto;min-width:280px;border:1px solid var(--line);}
  .sizetbl th,.sizetbl td{padding:6px 14px;font-size:12px;text-align:right;}
  .sizetbl th:first-child,.sizetbl td:first-child{text-align:left;}
  .card-item .clk{cursor:pointer;}
  .card-detail{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;}
  @media(max-width:640px){
    .wrap{padding:16px 12px 50px;}
    #t-sojin{display:none;}
    .cards{display:block;}
    .chips{gap:5px;} .chip{padding:5px 10px;font-size:12px;}
    select{max-width:100%;width:100%;}
    .dates{flex-direction:column;align-items:stretch;}
    .dates input{width:100%;}
    .kpi{min-width:calc(50% - 6px);}
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>【CNX】 SALES BOARD</h1>
  <div class="sub" id="period"></div>

  <div class="tabs">
    <div class="tab on" data-tab="sales">매출</div>
    <div class="tab" data-tab="sojin">소진율 (HANES)</div>
  </div>

  <!-- ===== 매출 탭 ===== -->
  <div id="tab-sales">
    <div class="filters">
      <div class="frow"><div class="flabel">브랜드</div><div class="chips" id="f-brand"></div></div>
      <div class="frow"><div class="flabel">대분류</div><div class="chips" id="f-cat"></div></div>
      <div class="frow"><div class="flabel">매장</div>
        <select id="f-store"><option value="">전체 매장</option></select></div>
      <div class="frow"><div class="flabel">기간</div>
        <div class="dates">
          <input type="date" id="d-from"> ~ <input type="date" id="d-to">
          <span class="chip" onclick="resetDates()">기간 초기화</span>
        </div></div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="l">순매출</div><div class="v" id="k-rev">-</div></div>
      <div class="kpi"><div class="l">판매수량</div><div class="v" id="k-qty">-</div></div>
      <div class="kpi"><div class="l">선택 매장 수</div><div class="v" id="k-store">-</div></div>
    </div>
    <div class="bar" id="trend"></div>
    <table id="t-store"><thead><tr><th>매장</th><th>순매출</th><th>수량</th></tr></thead><tbody></tbody></table>
  </div>

  <!-- ===== 소진율 탭 ===== -->
  <div id="tab-sojin" class="hide">
    <div class="filters">
      <div class="frow"><div class="flabel">대분류</div><div class="chips" id="s-cat"></div></div>
      <div class="frow"><div class="flabel">아이템</div><div class="chips" id="s-item"></div></div>
      <div class="frow"><div class="flabel">상태</div><div class="chips" id="s-status"></div></div>
      <div class="frow"><div class="flabel">상품 검색 (코드 또는 상품명)</div>
        <input class="search" id="s-search" type="text" placeholder="예: HAA261XTS28 또는 BEEFY"></div>
    </div>
    <div class="statline" id="s-counts"></div>
    <table id="t-sojin">
      <thead><tr>
        <th>사진</th>
        <th data-k="코드">코드</th><th data-k="name">상품명</th>
        <th data-k="발주">발주량</th><th data-k="판매">누적판매</th>
        <th data-k="창고재고">창고재고</th><th data-k="매장재고">매장재고</th>
        <th data-k="ST">ST%</th><th data-k="상태">상태</th>
      </tr></thead><tbody></tbody>
    </table>
    <div class="cards" id="c-sojin"></div>
  </div>
</div>

const uniq = (arr,k) => [...new Set(arr.map(d=>d[k]))].sort();

// ================= 매출 탭 =================
const SF = {brand:new Set(), cat:new Set(), store:'', from:'', to:''};

function buildSalesFilters(){
  const brands = uniq(DATA.sales,'브랜드');
  const cats = uniq(DATA.sales,'카테고리');
  const stores = uniq(DATA.sales,'매장명');
  renderChips('f-brand', brands, SF.brand, renderSales);
  renderChips('f-cat', cats, SF.cat, renderSales);
  const sel = document.getElementById('f-store');
  stores.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
  sel.onchange = e=>{SF.store=e.target.value;renderSales();};
  // 기간 기본값
  const ds = uniq(DATA.sales,'일자');
  SF.from = ds[0]; SF.to = ds[ds.length-1];
  document.getElementById('d-from').value = SF.from;
  document.getElementById('d-to').value = SF.to;
  document.getElementById('d-from').onchange = e=>{SF.from=e.target.value;renderSales();};
  document.getElementById('d-to').onchange = e=>{SF.to=e.target.value;renderSales();};
  document.getElementById('period').textContent = `분석기간 ${ds[0]} ~ ${ds[ds.length-1]}`;
}
function resetDates(){
  const ds = uniq(DATA.sales,'일자');
  SF.from=ds[0]; SF.to=ds[ds.length-1];
  document.getElementById('d-from').value=SF.from;
  document.getElementById('d-to').value=SF.to;
  renderSales();
}
function renderChips(id, vals, set, cb){
  const box=document.getElementById(id); box.innerHTML='';
  const all=document.createElement('span'); all.className='chip on'; all.textContent='전체';
  all.onclick=()=>{set.clear();[...box.children].forEach(c=>c.classList.remove('on'));all.classList.add('on');cb();};
  box.appendChild(all);
  vals.forEach(v=>{
    const c=document.createElement('span'); c.className='chip'; c.textContent=v;
    c.onclick=()=>{
      if(set.has(v)){set.delete(v);c.classList.remove('on');}
      else{set.add(v);c.classList.add('on');}
      all.classList.toggle('on', set.size===0);
      cb();
    };
    box.appendChild(c);
  });
}
function filterSales(){
  return DATA.sales.filter(d=>{
    if(SF.brand.size && !SF.brand.has(d.브랜드)) return false;
    if(SF.cat.size && !SF.cat.has(d.카테고리)) return false;
    if(SF.store && d.매장명!==SF.store) return false;
    if(SF.from && d.일자<SF.from) return false;
    if(SF.to && d.일자>SF.to) return false;
    return true;
  });
}
function renderSales(){
  const rows=filterSales();
  const rev=rows.reduce((a,d)=>a+d.매출,0);
  const qty=rows.reduce((a,d)=>a+d.수량,0);
  const stores=new Set(rows.map(d=>d.매장명));
  document.getElementById('k-rev').textContent=won(rev)+'원';
  document.getElementById('k-qty').textContent=won(qty)+'개';
  document.getElementById('k-store').textContent=stores.size+'곳';
  // 월별 추이
  const m={};
  rows.forEach(d=>{const k=d.일자.slice(0,7);m[k]=(m[k]||0)+d.매출;});
  const keys=Object.keys(m).sort();
  const max=Math.max(...keys.map(k=>m[k]),1);
  const trend=document.getElementById('trend');
  trend.innerHTML = keys.length? keys.map(k=>{
    const h=Math.max(m[k]/max*140,2);
    return `<div class="bcol"><div class="n">${won(m[k]/1e6)}백만</div>
            <div class="b" style="height:${h}px"></div><div class="t">${k}</div></div>`;
  }).join('') : '<div class="empty">데이터 없음</div>';
  // 매장별 표
  const byStore={};
  rows.forEach(d=>{byStore[d.매장명]=byStore[d.매장명]||{매출:0,수량:0};
    byStore[d.매장명].매출+=d.매출;byStore[d.매장명].수량+=d.수량;});
  const arr=Object.entries(byStore).sort((a,b)=>b[1].매출-a[1].매출);
  const tb=document.querySelector('#t-store tbody');
  tb.innerHTML = arr.length? arr.map(([s,v])=>
    `<tr><td>${s}</td><td>${won(v.매출)}원</td><td>${won(v.수량)}개</td></tr>`).join('')
    : '<tr><td colspan="3" class="empty">데이터 없음</td></tr>';
}

  renderChips('s-item', uniq(DATA.sojin,'아이템'), JF.item, renderSojin);
  renderChips('s-status', ['리오더','양호','주의','부진'], JF.status, renderSojin);
  document.getElementById('s-search').oninput = e=>{ JF.search=e.target.value.trim().toLowerCase(); renderSojin(); };
  document.querySelectorAll('#t-sojin th[data-k]').forEach(th=>{
    th.onclick=()=>{const k=th.dataset.k; sortDir = (sortKey===k)? -sortDir : -1; sortKey=k; renderSojin();};
  });
}
function filterSojin(){
  return DATA.sojin.filter(d=>{
    if(JF.cat.size && !JF.cat.has(d.대분류)) return false;
    if(JF.item.size && !JF.item.has(d.아이템)) return false;
    if(JF.status.size && !JF.status.has(d.상태)) return false;
    if(JF.search){
      const hay=(d.코드+' '+d.name).toLowerCase();
      if(!hay.includes(JF.search)) return false;
    }
    return true;
  });
}
function renderSojin(){
  let rows=filterSojin();
  const cnt={리오더:0,양호:0,주의:0,부진:0};
  rows.forEach(d=>cnt[d.상태]++);
  document.getElementById('s-counts').innerHTML =
    [['리오더','reorder'],['양호','good'],['주의','warn'],['부진','bad']]
    .map(([k,c])=>`<span class="sbadge ${c}">${k} ${cnt[k]}개</span>`).join('');
  rows.sort((a,b)=>{
    let x=a[sortKey],y=b[sortKey];
    if(typeof x==='string') return x<y?-sortDir:x>y?sortDir:0;
    return (x-y)*sortDir;
  });
  const tb=document.querySelector('#t-sojin tbody');
  tb.innerHTML = rows.length? rows.map((d,i)=>{
    const c=stCls(d.상태);
    const img = IMG[d.코드]
      ? `<img class="thumb" src="${IMG[d.코드]}" alt="" onerror="this.outerHTML='<span class=&quot;thumb-ph&quot;>없음</span>'">`
      : `<span class="thumb-ph">없음</span>`;
    return `<tr><td>${img}</td><td>${d.코드}</td><td>${d.name}</td>
      <td class="clk" onclick="toggleDetail(${i})">${won(d.발주)}</td>
      <td class="clk" onclick="toggleDetail(${i})">${won(d.판매)}</td>
      <td class="clk" onclick="toggleDetail(${i})">${won(d.창고재고)}</td>
      <td class="clk" onclick="toggleDetail(${i})">${won(d.매장재고)}</td>
      <td class="st ${c}">${d.ST}%</td>
      <td><span class="pill ${c}">${d.상태}</span></td></tr>
      <tr class="detail-row hide" id="detail-${i}"><td colspan="9">
        <div class="detail-wrap">${sizeTable(d)}</div></td></tr>`;
  }).join('') : '<tr><td colspan="9" class="empty">조건에 맞는 상품이 없습니다</td></tr>';
  window._sojinRows = rows;

  // 모바일 카드 (재고 강조)
  const cb=document.getElementById('c-sojin');
  cb.innerHTML = rows.length? rows.map((d,i)=>{
    const c=stCls(d.상태);
    const img = IMG[d.코드]
      ? `<img class="thumb" src="${IMG[d.코드]}" alt="" onerror="this.outerHTML='<span class=&quot;thumb-ph&quot;>없음</span>'">`
      : `<span class="thumb-ph">없음</span>`;
    return `<div class="card-item">
      <div class="card-top">${img}
        <div><div class="code">${d.코드}</div><div class="nm">${d.name}</div></div>
        <span class="pill ${c}">${d.상태}</span></div>
      <div class="stock-row">
        <div class="stock-box"><div class="sl">창고재고</div><div class="sv">${won(d.창고재고)}</div></div>
        <div class="stock-box"><div class="sl">매장재고</div><div class="sv">${won(d.매장재고)}</div></div>
      </div>
      <div class="meta-row">
        <span>발주 <b>${won(d.발주)}</b></span>
        <span>판매 <b>${won(d.판매)}</b></span>
        <span>소진율 <b class="st ${c}">${d.ST}%</b></span>
      </div>
      <div class="clk" style="margin-top:6px;font-size:12px;color:var(--accent);"
           onclick="toggleCardDetail(this,${i})">▸ 사이즈별 상세 보기</div>
      <div class="card-detail hide" id="cdetail-${i}">${sizeTable(d)}</div>
      </div>`;
  }).join('') : '<div class="empty">조건에 맞는 상품이 없습니다</div>';
  window._sojinRows = rows;
}

// 사이즈별 통합 표 (입고/판매/창고/매장)
function sizeTable(d){
  const all=new Set([...Object.keys(d.s_입고||{}),...Object.keys(d.s_판매||{}),
                     ...Object.keys(d.s_창고||{}),...Object.keys(d.s_매장||{})]);
  const order=['XS','S','M','L','XL','XXL','2XL','3XL','FREE','F'];
  const sizes=[...all].sort((a,b)=>{
    let ia=order.indexOf(a), ib=order.indexOf(b);
    if(ia<0)ia=99; if(ib<0)ib=99;
    return ia-ib || (a<b?-1:1);
  });
  if(!sizes.length) return '<div style="color:var(--muted);font-size:12px;">사이즈 정보 없음</div>';
  const g=(m,s)=>won((m||{})[s]||0);
  return `<h4>사이즈별 상세</h4>
    <table class="sizetbl"><thead><tr><th>사이즈</th>
      <th>입고</th><th>판매</th><th>창고재고</th><th>매장재고</th></tr></thead><tbody>
    ${sizes.map(s=>`<tr><td>${s}</td><td>${g(d.s_입고,s)}</td><td>${g(d.s_판매,s)}</td>
      <td>${g(d.s_창고,s)}</td><td>${g(d.s_매장,s)}</td></tr>`).join('')}
    </tbody></table>`;
}
function toggleDetail(i){
  const r=document.getElementById('detail-'+i);
  if(r) r.classList.toggle('hide');
}
function toggleCardDetail(el,i){
  const r=document.getElementById('cdetail-'+i);
  if(r){ r.classList.toggle('hide');
    el.textContent = r.classList.contains('hide') ? '▸ 사이즈별 상세 보기' : '▾ 사이즈별 상세 닫기'; }
}

// ================= 탭 전환 =================
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    const tab=t.dataset.tab;
    document.getElementById('tab-sales').classList.toggle('hide', tab!=='sales');
    document.getElementById('tab-sojin').classList.toggle('hide', tab!=='sojin');
  };
});

buildSalesFilters(); renderSales();
buildSojinFilters(); renderSojin();
</script>
